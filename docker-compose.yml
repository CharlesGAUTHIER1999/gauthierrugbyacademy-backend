services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gf_backend_app
    volumes:
      - ./:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: gf_backend_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: gf_backend_db
    environment:
      MYSQL_DATABASE: gauthier_fitness
      MYSQL_USER: charlesgauthier
      MYSQL_PASSWORD: "Bordeaux2025@"
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3308:3306"
    volumes:
      - gf_mysql:/var/lib/mysql

volumes:
  gf_mysql:
